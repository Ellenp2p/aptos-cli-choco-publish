name: Check Aptos CLI update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: check-update-dispatch
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  check_and_trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether a new Aptos CLI version needs publishing
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTagPattern = /^aptos-cli-(v?\d+\.\d+\.\d+)$/;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: 'aptos-labs',
              repo: 'aptos-core',
              per_page: 100,
            });

            const release = releases.find((item) => !item.draft && !item.prerelease && releaseTagPattern.test(item.tag_name));
            if (!release) {
              core.setFailed('Could not find a stable Aptos CLI release tag in aptos-labs/aptos-core releases');
              return;
            }

            const rawTag = release.tag_name;
            const tagMatch = rawTag.match(releaseTagPattern);
            if (!tagMatch) {
              core.setFailed(`Unexpected Aptos release tag format: ${rawTag}`);
              return;
            }

            const version = tagMatch[1].startsWith('v') ? tagMatch[1] : `v${tagMatch[1]}`;
            const packageVersion = version.replace(/^v/, '');

            core.info(`Latest aptos CLI release tag: ${rawTag}`);
            core.info(`Dispatch version input: ${version}`);
            core.info(`Chocolatey package version to check: ${packageVersion}`);

            const checkUrl = `https://community.chocolatey.org/api/v2/package/aptos/${packageVersion}`;
            const response = await fetch(checkUrl, { redirect: 'manual' });

            let shouldPublish;
            if (response.status === 404) {
              shouldPublish = true;
            } else if ([200, 301, 302, 303, 307, 308].includes(response.status)) {
              shouldPublish = false;
            } else {
              core.setFailed(`Unexpected Chocolatey response status ${response.status} for ${checkUrl}`);
              return;
            }
            core.info(`Chocolatey response status: ${response.status}`);
            core.info(`Should trigger publish: ${shouldPublish}`);

            core.setOutput('version', version);
            core.setOutput('should_publish', shouldPublish ? 'true' : 'false');

      - name: Trigger publish workflow
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const targetRef = context.payload.repository.default_branch;

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cli-publish.yaml',
              ref: targetRef,
              inputs: {
                version: '${{ steps.check.outputs.version }}',
              },
            });

            core.info(`Triggered cli-publish.yaml on ${targetRef} with version ${{ steps.check.outputs.version }}`);

      - name: No update needed
        if: steps.check.outputs.should_publish != 'true'
        run: echo "Chocolatey already has the latest Aptos version, no publish triggered."
